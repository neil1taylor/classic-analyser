name: Deploy to Code Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install container-registry
          ibmcloud plugin install code-engine

      - name: Login to IBM Cloud
        run: ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }} -r us-south -g infra-explorer-rg

      - name: Build and push container image
        run: |
          ibmcloud cr login
          docker build -t us.icr.io/${{ secrets.ICR_NAMESPACE }}/infrastructure-explorer:${{ github.sha }} .
          docker push us.icr.io/${{ secrets.ICR_NAMESPACE }}/infrastructure-explorer:${{ github.sha }}

      - name: Deploy to Code Engine
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
        run: |
          ibmcloud ce project select --name ${{ secrets.CE_PROJECT }}
          # Ensure registry secret exists for Code Engine to pull from ICR
          if ibmcloud ce registry get --name icr-secret > /dev/null 2>&1; then
            ibmcloud ce registry update --name icr-secret \
              --server us.icr.io \
              --username iamapikey \
              --password "$IBM_CLOUD_API_KEY"
          else
            ibmcloud ce registry create --name icr-secret \
              --server us.icr.io \
              --username iamapikey \
              --password "$IBM_CLOUD_API_KEY"
          fi
          if ibmcloud ce app get --name infrastructure-explorer > /dev/null 2>&1; then
            ibmcloud ce app update \
              --name infrastructure-explorer \
              --image us.icr.io/${{ secrets.ICR_NAMESPACE }}/infrastructure-explorer:${{ github.sha }} \
              --registry-secret icr-secret
          else
            ibmcloud ce app create \
              --name infrastructure-explorer \
              --image us.icr.io/${{ secrets.ICR_NAMESPACE }}/infrastructure-explorer:${{ github.sha }} \
              --registry-secret icr-secret \
              --port 3000 \
              --cpu 0.5 \
              --memory 1G \
              --min-scale 0 \
              --max-scale 10 \
              --request-timeout 300
          fi
