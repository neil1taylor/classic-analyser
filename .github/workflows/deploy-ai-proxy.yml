name: Deploy AI Proxy

on:
  push:
    branches: [main]
    paths:
      - 'ai-proxy/**'
  workflow_dispatch:

env:
  REGISTRY: us.icr.io
  NAMESPACE: infra-explorer
  APP_NAME: ai-proxy
  CE_PROJECT: infrastructure-explorer
  CE_REGION: us-south

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install container-registry
          ibmcloud plugin install code-engine

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r ${{ env.CE_REGION }}
          ibmcloud cr login --client docker

      - name: Build and push image
        working-directory: ai-proxy
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:latest

      - name: Scan container image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Deploy to Code Engine
        run: |
          ibmcloud ce project select --name ${{ env.CE_PROJECT }}
          ibmcloud ce app update \
            --name "$APP_NAME" \
            --image "$REGISTRY/$NAMESPACE/$APP_NAME:${{ github.sha }}" \
            --env WATSONX_API_KEY="${{ secrets.WATSONX_API_KEY }}" \
            --env WATSONX_PROJECT_ID="${{ secrets.WATSONX_PROJECT_ID }}" \
            --env WATSONX_URL="${{ secrets.WATSONX_URL }}" \
            --env AI_PROXY_SECRET="${{ secrets.AI_PROXY_SECRET }}" \
            --env NODE_ENV=production \
            --env PORT=8080

      - name: Verify deployment
        run: |
          APP_URL=$(ibmcloud ce app get --name "$APP_NAME" --output url)
          echo "Deployed to: ${APP_URL}"
          for i in 1 2 3 4 5 6; do
            if curl -sf "${APP_URL}/health" > /dev/null 2>&1; then
              echo "Health check passed on attempt ${i}"
              exit 0
            fi
            echo "Health check attempt ${i} failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 60s — rolling back"
          ibmcloud ce app update --name "$APP_NAME" --image "$REGISTRY/$NAMESPACE/$APP_NAME:latest"
          exit 1
